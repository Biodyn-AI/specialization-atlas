# NOTE: This config documents the original experiment configuration.
# Absolute paths have been replaced with <ORIGINAL_WORKSPACE>/ placeholders.
# These configs are provided for provenance and reproducibility documentation.

project:
  name: scgpt-causal-immune-family-overlap
  seed: 42

paths:
  scgpt_repo: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/external/scGPT
  scgpt_checkpoint: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/external/scGPT_checkpoints/whole-human/best_model.pt
  scgpt_vocab: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/external/scGPT_checkpoints/whole-human/vocab.json
  tabula_sapiens_h5ad: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/data/raw/tabula_sapiens_immune.h5ad
  gene_info_csv: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/external/gene_info.csv
  hgnc_alias_tsv: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/external/hgnc_complete_set.txt
  processed_h5ad: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/data/perturb/dixit_7_days/perturb_processed_symbols.h5ad
  dorothea_tsv: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/external/networks/trrust_human.tsv
  causal_output_dir: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/outputs/head_layer_checkpoint_replication/causal_immune_family_overlap

scgpt_dataset:
  max_genes: 1200
  include_zero: false
  sort_by_expression: true
  pad_token_id: null
  cls_token_id: null
  force_gene_names:
    - ETS1
    - EGR1
    - BAX
    - CSNK2B
    - MYB
    - PARP1
    - RHOC
    - TAF12
    - CCND2
    - GDF15
    - GGPS1
    - IMPDH2
    - SOD1
    - STMN1
    - TMPO
    - UBE2S
    - VEGFA

model:
  entrypoint: scgpt.model.TransformerModel
  model_args: {}
  prefix_to_strip: null
  forward_key_map:
    gene_ids: src
    gene_values: values
    src_key_padding_mask: src_key_padding_mask

evaluation:
  dorothea_confidence: [A, B, C, D]

causal_intervention:
  output_dir: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/outputs/head_layer_checkpoint_replication/causal_immune_family_overlap
  max_cells: 12
  batch_size: 1
  disable_fast_transformer: true
  torch_num_threads: 1
  torch_num_interop_threads: 1
  resume: false
  debug_log: false
  checkpoint_path: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/outputs/head_layer_checkpoint_replication/causal_immune_family_overlap/checkpoint.json
  checkpoint_every_pairs: 5
  progress_every_pairs: 5
  interventions: [ablation]
  ablation_mode: value
  baseline_value: 0.0
  swap_strategy: random
  output_key: null
  output_reduce: mean
  max_pairs: 17
  random_control_pairs: 10
  random_seed: 42
  candidate_sources_path: null
  candidate_targets_path: null
  pairs_path: <ORIGINAL_WORKSPACE>/subproject_03_head_layer_specialization_atlas/implementation/network_inference_materials/research/head_layer_specialization_atlas/configs/immune_family_overlap_pairs.tsv
  primary_intervention: ablation
  case_study_count: 5
  case_study_component_count: 5
  score_mode: abs
  tracing:
    enabled: false
