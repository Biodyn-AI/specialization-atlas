# NOTE: This config documents the original experiment configuration.
# Absolute paths have been replaced with <ORIGINAL_WORKSPACE>/ placeholders.
# These configs are provided for provenance and reproducibility documentation.

project:
  name: hl-checkpoint-whole_human
  seed: 42

paths:
  scgpt_repo: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/external/scGPT
  scgpt_checkpoint: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/external/scGPT_checkpoints/whole-human/best_model.pt
  scgpt_vocab: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/external/scGPT_checkpoints/whole-human/vocab.json
  gene_info_csv: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/external/gene_info.csv
  hgnc_alias_tsv: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/external/hgnc_complete_set.txt
  processed_h5ad: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/outputs/head_layer_checkpoint_replication/immune_shared_hvg1200_processed.h5ad
  attention_scores_head_layer: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/outputs/head_layer_checkpoint_replication/whole_human/attention_scores_head_layer.npy
  attention_counts_head_layer: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/outputs/head_layer_checkpoint_replication/whole_human/attention_counts_head_layer.npy
  dorothea_tsv: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/external/networks/trrust_human.tsv

scgpt_dataset:
  max_genes: 1200
  include_zero: false
  sort_by_expression: true
  pad_token_id: null
  cls_token_id: null

model:
  entrypoint: scgpt.model.TransformerModel
  model_args: {}
  prefix_to_strip: null
  forward_key_map:
    gene_ids: src
    gene_values: values
    src_key_padding_mask: src_key_padding_mask

attention:
  reduce_layers: false
  reduce_heads: false
  max_cells: 600
  sample_strategy: random
  sample_seed: 42
  score_dtype: float16
  count_dtype: int32
  share_counts: true
