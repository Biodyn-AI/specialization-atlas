model:
  entrypoint: scgpt.model.TransformerModel
  model_args: {}
  prefix_to_strip: null
  forward_key_map:
    gene_ids: src
    gene_values: values
    src_key_padding_mask: src_key_padding_mask
evaluation:
  dorothea_confidence:
  - A
  - B
  - C
  - D
causal_intervention:
  output_dir: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/outputs/head_layer_checkpoint_replication/causal_immune_family
  max_cells: 10
  batch_size: 1
  disable_fast_transformer: true
  torch_num_threads: 1
  torch_num_interop_threads: 1
  resume: false
  debug_log: false
  checkpoint_path: <ORIGINAL_WORKSPACE>/single_cell_mechinterp/outputs/head_layer_checkpoint_replication/causal_immune_family/checkpoint.json
  checkpoint_every_pairs: 5
  progress_every_pairs: 5
  interventions:
  - ablation
  ablation_mode: value
  baseline_value: 0.0
  swap_strategy: random
  output_key: null
  output_reduce: mean
  max_pairs: 20
  random_control_pairs: 20
  random_seed: 42
  candidate_sources_path: <ORIGINAL_WORKSPACE>/subproject_03_head_layer_specialization_atlas/implementation/network_inference_materials/research/head_layer_specialization_atlas/configs/immune_family_sources.txt
  candidate_targets_path: null
  pairs_path: null
  primary_intervention: ablation
  case_study_count: 5
  case_study_component_count: 5
  score_mode: abs
  tracing:
    enabled: false
